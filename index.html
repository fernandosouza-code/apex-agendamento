<body>
<div id="root"></div>
<script>
const{useState,useEffect,useCallback}=React;
const h=React.createElement;

// ---- CONFIG ----
const API_KEY="$2a$10$K/5qgSRLmHUrRRtiYU5D3.BZGNDFWa62lAHpzeHQcA2u5c7IE2vTi";
const BIN_IDS_KEY="apex_bin_ids_v1";
const DEFAULT_BIN_IDS={"prestadores":"69eb7fb8aaba88219732f85b","agendamentos":"69eb801336566621a8e960f8"};
const BASE_URL="https://api.jsonbin.io/v3/b";

// ---- JSONBIN API ----
const createBin=(name,data)=>fetch(BASE_URL,{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"X-Bin-Name":name,"X-Private":"false"},body:JSON.stringify({records:data,_initialized:true})}).then(r=>r.json());
const readBinRecords=async id=>{const d=await readBin(id);return Array.isArray(d)?d:(d&&Array.isArray(d.records)?d.records:[]);};
const updateBinRecords=(id,data)=>updateBin(id,{records:data,_initialized:true});
const readBin=async id=>{
  const r=await fetch(`${BASE_URL}/${id}/latest`,{headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":"false"}});
  const d=await r.json();
  console.log("readBin",id,"status:",r.status,"data:",JSON.stringify(d).slice(0,100));
  return d.record!==undefined?d.record:d;
};
const updateBin=async(id,data)=>{
  const r=await fetch(`${BASE_URL}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify(data)});
  const d=await r.json();
  console.log("updateBin",id,"status:",r.status,"resp:",JSON.stringify(d).slice(0,100));
  return d;
};

// ---- UTILS ----
const uid=()=>Math.random().toString(36).slice(2,9);
const cc=c=>c.replace(/\D/g,"");
const fc=c=>{const n=cc(c).slice(0,8);return n.length>5?`${n.slice(0,5)}-${n.slice(5)}`:n;};
const DIAS=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DIAS_F=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const HORAS=["07:00","08:00","09:00","10:00","11:00","13:00","14:00","15:00","16:00","17:00"];
const ld=(d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fd=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const fmin=m=>{if(!m)return"0 min";if(m<60)return`${m} min`;const hh=Math.floor(m/60),r=m%60;return r?`${hh}h ${r}min`:`${hh}h`;};
const JANELA=600;
const DESLOC=60;

// ---- PRODUTOS ----
const PRODUTOS=[
  {id:"p01",cat:"Telemetria",nome:"Instalado veículos leves e pesados",min:40},
  {id:"p02",cat:"Telemetria",nome:"Instalado motos ou maquinários",min:40},
  {id:"p03",cat:"Telemetria",nome:"Instalado veículos leves bloqueador",min:60},
  {id:"p04",cat:"Telemetria",nome:"Instalado veículos leves e pesados + CAN",min:60},
  {id:"p05",cat:"Identificador",nome:"Identificador veículos leves e pesados",min:60},
  {id:"p06",cat:"Identificador",nome:"Identificador RFID veículos leves e pesados",min:60},
  {id:"p07",cat:"Identificador",nome:"Identificador RFID + CAN",min:80},
  {id:"p08",cat:"Identificador",nome:"Identificador + CAN",min:90},
  {id:"p09",cat:"Trava de Ignição",nome:"Imobilizador veículos leves",min:80},
  {id:"p10",cat:"Trava de Ignição",nome:"Imobilizador RFID veículos leves",min:80},
  {id:"p11",cat:"Trava de Ignição",nome:"Imobilizador RFID + CAN",min:90},
  {id:"p12",cat:"Trava de Ignição",nome:"Imobilizador + CAN",min:100},
  {id:"p13",cat:"Videotelemetria",nome:"Cobli Cam (2 câmeras)",min:90},
  {id:"p14",cat:"Videotelemetria",nome:"Cobli Multicam (3 câmeras internas)",min:120},
  {id:"p15",cat:"Videotelemetria",nome:"Cobli Multicam (2 câmeras + 1 externa)",min:240},
  {id:"p16",cat:"Videotelemetria",nome:"Cobli Multicam (4 câmeras)",min:240},
  {id:"p17",cat:"Videotelemetria",nome:"Cobli Multicam (5 câmeras)",min:300},
];
const CAT_CLS={Telemetria:"btel",Identificador:"bidf","Trava de Ignição":"btrv",Videotelemetria:"bvid"};

// ---- GEOCODE ----
// Geocode by CEP using ViaCEP + Nominatim (OpenStreetMap)
const geocodeCEP=async cep=>{
  try{
    const v=await fetch("https://viacep.com.br/ws/"+cep+"/json/").then(r=>r.json());
    if(v.erro)return null;
    const addr=encodeURIComponent([v.logradouro,v.bairro,v.localidade,v.uf,"Brasil"].filter(Boolean).join(", "));
    const n=await fetch("https://nominatim.openstreetmap.org/search?q="+addr+"&format=json&limit=1",{headers:{"Accept-Language":"pt-BR"}}).then(r=>r.json());
    if(n&&n[0])return{lat:parseFloat(n[0].lat),lng:parseFloat(n[0].lon)};
    // fallback: search just city
    const city=encodeURIComponent(v.localidade+", "+v.uf+", Brasil");
    const n2=await fetch("https://nominatim.openstreetmap.org/search?q="+city+"&format=json&limit=1").then(r=>r.json());
    if(n2&&n2[0])return{lat:parseFloat(n2[0].lat),lng:parseFloat(n2[0].lon)};
    return null;
  }catch{return null;}
};

// Geocode by address using Nominatim
const geocodeAddress=async addr=>{
  try{
    const q=encodeURIComponent(addr+", Brasil");
    const n=await fetch("https://nominatim.openstreetmap.org/search?q="+q+"&format=json&limit=1",{headers:{"Accept-Language":"pt-BR"}}).then(r=>r.json());
    if(n&&n[0])return{lat:parseFloat(n[0].lat),lng:parseFloat(n[0].lon)};
    return null;
  }catch{return null;}
};

const geocode=async q=>{
  const isCep=/^\d{5}-?\d{3}$/.test(q.trim())||/^\d{8}$/.test(q.trim());
  return isCep?geocodeCEP(q.replace(/\D/g,"")):geocodeAddress(q);
};

// ---- CAPACITY ----
const getTecCapacity=(prestador,agendamentos,data)=>{
  const nTec=prestador.tecnicos||1;
  const tecs=Array.from({length:nTec},(_,i)=>({id:i+1,label:`Técnico ${i+1}`,minutosUsados:0,ags:[]}));
  agendamentos.filter(a=>a.prestadorId===prestador.id&&a.data===data&&a.status!=="cancelado").forEach(ag=>{
    const tIdx=(ag.tecnico||1)-1;
    if(tecs[tIdx]){tecs[tIdx].minutosUsados+=ag.duracaoTotal;tecs[tIdx].ags.push(ag);}
  });
  return tecs.map(t=>({...t,minutosLivres:Math.max(0,JANELA-t.minutosUsados),pct:Math.round(Math.min(100,(t.minutosUsados/JANELA)*100))}));
};
const getBestTec=(tecs,dur)=>{const av=tecs.filter(t=>t.minutosLivres>=dur);if(!av.length)return null;return av.sort((a,b)=>a.minutosUsados-b.minutosUsados)[0];};
const haversine=(lat1,lon1,lat2,lon2)=>{const R=6371,toR=Math.PI/180,dLat=(lat2-lat1)*toR,dLon=(lon2-lon1)*toR,a=Math.sin(dLat/2)**2+Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));};

const getAvailableSlots=(prestador,agendamentos,duracao,n=45)=>{
  const out=[],now=new Date(),seen=new Set();
  for(let i=1;i<=n;i++){

function SetupScreen({onReady}){
  const[status,setStatus]=useState("idle");

  const[binIds,setBinIds]=useState(null);
  const[existingId,setExistingId]=useState("");
  const[loadingExisting,setLoadingExisting]=useState(false);
  const[existErr,setExistErr]=useState("");

  const criar=async()=>{
    setStatus("creating");setErrMsg("");
    try{
      const[rp,ra]=await Promise.all([
        createBin("apex-prestadores",[]),
        createBin("apex-agendamentos",[])
      ]);
      if(rp.error||ra.error)throw new Error(rp.message||ra.message||"Erro da API");
      if(!rp.metadata?.id||!ra.metadata?.id)throw new Error("Resposta inesperada: "+JSON.stringify(rp).slice(0,100));
      const ids={prestadores:rp.metadata.id,agendamentos:ra.metadata.id};
      localStorage.setItem(BIN_IDS_KEY,JSON.stringify(ids));
      setBinIds(ids);setStatus("done");
    }catch(e){setErrMsg(e.message||"Erro desconhecido");setStatus("error");}
  };

  const usarExistente=async()=>{
    setExistErr("");
    if(!existingId.trim()){setExistErr("Cole o ID do bin de prestadores");return;}

      const stored=JSON.parse(existingId.trim());
      await readBin(stored.prestadores);
      localStorage.setItem(BIN_IDS_KEY,JSON.stringify(stored));
      onReady(stored);
    }catch{
      try{
        await readBin(existingId.trim());
        setExistErr("Cole o JSON completo com os dois IDs, não só um.");

      h("div",{className:"setup-title"},"Erro ao criar bins"),

// ============================================================
// APP
// ============================================================
function App(){
  const[binIds,setBinIds]=useState(null);
  const[ready,setReady]=useState(false);
  const[ps,setPs]=useState([]);
  const[ags,setAgs]=useState([]);
  const[tab,setTab]=useState("agenda");
  const[syncing,setSyncing]=useState(false);
  const[saveErr,setSaveErr]=useState("");
  const[showIds,setShowIds]=useState(false);

  useEffect(()=>{
    // Always use DEFAULT_BIN_IDS — overwrite whatever is in localStorage
    localStorage.setItem(BIN_IDS_KEY,JSON.stringify(DEFAULT_BIN_IDS));
    setBinIds(DEFAULT_BIN_IDS);
    setReady(true);
  },[]);

  useEffect(()=>{
    if(!ready||!binIds)return;
    const fetchData=async()=>{
      setSyncing(true);
      try{
        const[p,a]=await Promise.all([readBinRecords(binIds.prestadores),readBinRecords(binIds.agendamentos)]);
        setPs(Array.isArray(p)?p:[]);
        setAgs(Array.isArray(a)?a:[]);
      }catch{}
      setSyncing(false);
    };
    fetchData();
    const iv=setInterval(fetchData,30000);
    return()=>clearInterval(iv);
  },[ready,binIds]);

  const savPs=async novo=>{
    setPs(novo);
    try{
      const r=await updateBinRecords(binIds.prestadores,novo);
      console.log("savPs resp:",JSON.stringify(r).slice(0,200));
      if(r&&r.error){setSaveErr("Erro ao salvar: "+JSON.stringify(r));return;}
      if(!r||!r.metadata){setSaveErr("Resposta inesperada ao salvar: "+JSON.stringify(r).slice(0,150));return;}
      setSaveErr("");
    }catch(e){setSaveErr("Exceção: "+e.message);}
  };
  const savAgs=async novo=>{
    setAgs(novo);
    try{
      const r=await updateBinRecords(binIds.agendamentos,novo);
      console.log("savAgs resp:",JSON.stringify(r).slice(0,200));
      if(r&&r.error){setSaveErr("Erro ao salvar: "+JSON.stringify(r));return;}
      if(!r||!r.metadata){setSaveErr("Resposta inesperada ao salvar: "+JSON.stringify(r).slice(0,150));return;}
      setSaveErr("");
    }catch(e){setSaveErr("Exceção: "+e.message);}
  };
  const addAg=async a=>{const novo=[...ags,a];await savAgs(novo);};
  const updAg=async u=>{await savAgs(ags.map(a=>a.id===u.id?u:a));};

  const handleSetupReady=ids=>{setBinIds(ids);setReady(true);};

  if(!ready)return h(SetupScreen,{onReady:handleSetupReady});

  const TABS=[{k:"agenda",l:"Agendamento"},{k:"prest",l:"Prestadores"},{k:"painel",l:"Painel"}];

  return h("div",null,
    h("header",{className:"hdr"},
      h("div",{className:"hdr-logo"},"Cobli",h("span",{className:"hdr-tag"},"APEX")),
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        syncing&&h("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:12,opacity:.7}},h("div",{className:"spinner"}),"Sincronizando..."),
        h("span",{className:"hdr-sub"},"Agenda Prestadores de Excelência"),
        h("button",{style:{background:"rgba(255,255,255,.15)",border:"none",color:"white",fontSize:12,padding:"4px 10px",borderRadius:6,cursor:"pointer",marginRight:4},onClick:()=>setShowIds(!showIds)},"🔑 IDs"),
        h("button",{style:{background:"rgba(255,255,255,.15)",border:"none",color:"white",fontSize:12,padding:"4px 10px",borderRadius:6,cursor:"pointer"},onClick:()=>{localStorage.removeItem(BIN_IDS_KEY);window.location.reload();}},"Sair")
      )
    ),
    h("nav",{className:"nav-bar"},TABS.map(t=>h("button",{key:t.k,className:`nb${tab===t.k?" on":""}`,onClick:()=>setTab(t.k)},t.l))),
    saveErr&&h("div",{style:{background:"#fef2f2",color:"#991b1b",padding:"10px 24px",fontSize:13,borderBottom:"1px solid #fca5a5",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("span",null,"⚠ "+saveErr),
      h("button",{style:{background:"none",border:"none",color:"#991b1b",cursor:"pointer",fontSize:13,padding:0},onClick:()=>setSaveErr("")},"✕")
    ),
    showIds&&h("div",{style:{background:"#fffbeb",borderBottom:"1px solid #fcd34d",padding:"12px 24px"}},
      h("div",{style:{fontSize:12,fontWeight:600,color:"#92400e",marginBottom:6}},"IDs do banco de dados — compartilhe com o time:"),
      h("div",{style:{fontFamily:"monospace",fontSize:12,background:"white",border:"1px solid #fcd34d",borderRadius:6,padding:"8px 12px",wordBreak:"break-all",marginBottom:8}},JSON.stringify(binIds,null,2)),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{style:{fontSize:12,padding:"4px 10px"},onClick:()=>{navigator.clipboard?.writeText(JSON.stringify(binIds))}},"📋 Copiar"),
        h("button",{style:{fontSize:12,padding:"4px 10px"},onClick:()=>setShowIds(false)},"Fechar")
      )
    ),
    h("div",{className:"body"},
      tab==="agenda"&&h(AgendaTab,{ps,ags,onSave:addAg}),
      tab==="prest"&&h(PrestTab,{ps,ags,onSave:savPs}),
      tab==="painel"&&h(PainelTab,{ps,ags,onUpdAg:updAg})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
